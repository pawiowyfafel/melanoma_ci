# docker-compose.prod.yml
# Uruchamiane przez Ansible na VM3.
# Zmienne środowiskowe przekazywane przez Ansible:
#   REGISTRY  — adres rejestru, np. 192.168.56.10:5000
#   TAG       — tag obrazu, np. numer buildu Jenkinsa
#   VM2_IP    — IP VM2 gdzie działa serwis AI, np. 192.168.56.20

version: "3.9"

services:
  frontend:
    image: "${REGISTRY}/melanoma-frontend:${TAG:-latest}"
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

  backend:
    image: "${REGISTRY}/melanoma-backend:${TAG:-latest}"
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AI_SERVICE_URL: "http://${VM2_IP}:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
